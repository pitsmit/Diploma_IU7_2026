services:

  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests

    privileged: true

    volumes:
      - /dev:/dev
      - ./coverage-report:/app/coverage-report

  app:
    build:
      context: .
      dockerfile: Dockerfile.app

    ports:
      - "8080:8080"

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e